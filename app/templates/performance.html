<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Review</title>
    <link rel="stylesheet" href="//code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        h2 {
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: left;
        }
        th {
            background-color: #007bff;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        tr:hover {
            background-color: #ddd;
        }
        .ui-datepicker {
            font-size: 14px;
        }
        input[type="text"], input[type="button"], select {
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        input[type="button"] {
            background-color: #007bff;
            color: white;
            cursor: pointer;
        }
        input[type="button"]:hover {
            background-color: #0258b3;
        }
        #performanceForm {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <h2>Performance Review</h2>
    <form id="performanceForm">
        <input type="hidden" id="worker_id" value="{{ worker_id }}">
        Start Date: <input type="text" id="start_date" name="start_date">
        End Date: <input type="text" id="end_date" name="end_date">
        <select id="dateShortcuts">
            <option value="">Select Period</option>
            <option value="today">Today</option>
            <option value="yesterday">Yesterday</option>
            <option value="thisWeek">This Week</option>
            <option value="thisMonth">This Month</option>
        </select>
        <input type="button" value="Submit" onclick="fetchPerformance()">
    </form>
    <table id="performanceTable">
        <thead>
            <tr>
                <th>Process Name</th>
                <th>Total Scanned Items</th>
                <th>Total Time Spent (hrs)</th>
                <th>Items Per Hour</th>
                <th>Performance (%)</th>
            </tr>
        </thead>
        <tbody>
            <!-- Data will be inserted here -->
        </tbody>
    </table>
    <div id="totalPerformance">
        <!-- Итоговые показатели будут отображены здесь -->
    </div>
    <canvas id="performanceChart" width="400" height="150"></canvas>

    <script>
        $(function() {
            $("#start_date, #end_date").datepicker({
            firstDay: 1 // Установка понедельника как первого дня недели
        });
            $("#dateShortcuts").change(setDateRange);
            fetchPerformance(); // Invoke on page load
        });

        function setDateRange() {
            var today = new Date();
            var start, end;

            switch ($("#dateShortcuts").val()) {
                case "today":
                    start = end = today;
                    break;
                case "yesterday":
                    start = new Date(today);
                    end = new Date(today);
                    start.setDate(today.getDate() - 1);
                    break;
                case "thisWeek":
                    var first = today.getDate() - today.getDay() + 1; // First day is the day of the month - the day of the week
                    var last = first + 6; // last day is the first day + 6
                    start = new Date(today.setDate(first));
                    end = new Date(today.setDate(last));
                    break;
                case "thisMonth":
                    start = new Date(today.getFullYear(), today.getMonth(), 1);
                    end = new Date(today.getFullYear(), today.getMonth() + 1, 0);
                    break;
            }

            $("#start_date").datepicker("setDate", start);
            $("#end_date").datepicker("setDate", end);
            fetchPerformance();
        }

        // Dummy function to simulate fetching and updating data
        function fetchPerformance() {
            var workerId = $("#worker_id").val();
            var startDate = $("#start_date").val() || "01/01/1970";
            var endDate = $("#end_date").val() || "12/31/2099";

            $.ajax({
                url: '/performance/data/',
                type: 'GET',
                data: {
                    'worker_id': workerId,
                    'start_date': startDate,
                    'end_date': endDate
                },
                success: function(response) {
                    updateTable(response.data);
                    createChart(response.data); 
                },
                error: function(xhr, status, error) {
                    console.error("Ошибка при получении данных: " + error);
                }
            });
        }

        function updateTable(data) {
            const tableBody = document.getElementById('performanceTable').getElementsByTagName('tbody')[0];
            tableBody.innerHTML = '';
            let totalWeightedPerformance = 0;
            let totalHours = 0;
            data.forEach(item => {
                let row = `<tr>
                            <td>${item.process_name}</td>
                            <td>${item.total_scanned_items}</td>
                            <td>${parseFloat(item.total_time_spent).toFixed(2)}</td>
                            <td>${parseFloat(item.items_per_hour).toFixed(2)}</td>
                            <td>${parseFloat(item.overall_performance).toFixed(2)}%</td>
                        </tr>`;
                tableBody.innerHTML += row;
                // Для расчета взвешенного среднего используем производительность, умноженную на время
                totalWeightedPerformance += (parseFloat(item.overall_performance) * parseFloat(item.total_time_spent));
                totalHours += parseFloat(item.total_time_spent);
            });

            // Вычисляем общую взвешенную производительность
            let totalPerformance = totalHours > 0 ? totalWeightedPerformance / totalHours : 0;
            document.getElementById('totalPerformance').innerHTML = `<h3>Total Weighted Performance: ${totalPerformance.toFixed(2)}%</h3>`;
        }
        
        
    </script>
</body>
</html>
