<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Отзывы и жалобы</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .feedback { margin-bottom: 20px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .feedback p { margin: 5px 0; }
        a { color: #007bff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h2>Отзывы и жалобы</h2>
    {% for feedback in feedbacks %}
    <div class="feedback">
        <p><strong>От: {{ feedback.worker_id }}</strong> | Дата: {{ feedback.feedback_date.strftime('%Y-%m-%d') }}</p>
        <p>{{ feedback.feedback_text[:50] }}... <a href="{{ url_for('feedback_details', feedback_id=feedback.feedback_id) }}">Читать полностью</a></p>
    </div>
    {% else %}
    <p>Отзывов пока нет.</p>
    {% endfor %}
    <a href="{{ url_for('admin_home') }}">На главную</a>
</body>
</html>
