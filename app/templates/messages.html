<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Messages</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            margin: 20px;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            background: white;
            margin-top: 8px;
            padding: 10px;
            border-radius: 4px;
            box-shadow: 0 2px 3px rgba(0, 0, 0, 0.1);
        }

        a {
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
  <a href="{{ url_for('worker_home') }}">Домашняя страница</a>
    <h1>Messages</h1>
    <ul>
        {% for message in messages %}
        <li>
            <a href="{{ url_for('message_details', message_id=message.message_id) }}">
                {{ message.title }} - {{ message.created_at.strftime('%Y-%m-%d %H:%M:%S') }}
            </a>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
