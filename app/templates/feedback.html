<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Обратная связь</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 90vh;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 20px;
        }
        form {
            background-color: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 90vh;
            max-width: 100vh;
        }
        p {
            margin: 12px 0;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            margin: 30px 0px;
            height: 30vh;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
            font-family: 'Roboto', sans-serif;
        }
        input[type="submit"] {
            width: 100%;
            background-color: #007bff;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 500;
        }
        input[type="submit"]:hover {
            background-color: #0056b3;
        }
        label {
            font-weight: 500;
            margin-bottom: 5px;
        }
        .checkbox {
            display: flex;
            align-items: center;
            margin: 15px 0px;
        }
        .checkbox input {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div>
        <a href="{{ url_for('worker_home') }}">Домашняя страница</a>
        <h1>Обратная связь</h1>
        <form action="" method="post">
            {{ form.hidden_tag() }}
            <div>
                {{ form.content.label }}
                {{ form.content(size=32) }}
            </div>
            <div class="checkbox">
                {{ form.anonymous }} 
                {{ form.anonymous.label }}
            </div>
            <div>
                {{ form.submit() }}
            </div>
        </form>
    </div>
</body>
</html>
