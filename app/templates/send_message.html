<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create New Message</title>
    <style>
        #editor {
            border: 1px solid #ccc;
            padding: 10px;
            min-height: 200px;
        }
        #editor img {
            max-width: 100%;
        }
    </style>
</head>
<body>
    <h1>Create New Message</h1>
    <form id="messageForm" action="{{ url_for('send_message') }}" method="post" enctype="multipart/form-data">
        <input type="text" name="title" placeholder="Enter message title" required><br>
        <div id="editor" contenteditable="true"></div>
        <!-- Hidden input to store content -->
        <input type="hidden" name="content" id="hiddenInput">
        <input type="file" name="files" id="fileInput" accept="image/*" multiple><br>
        <!-- Recipient input -->
        <input type="text" name="recipient" placeholder="Enter recipient worker login"><br>
    
        <!-- Group selection -->
        <select name="group_id">
            <option value="">Select a group</option>
            {% for group in groups %}
            <option value="{{ group.group_id }}">{{ group.group_name }}</option>
            {% endfor %}
        </select><br>
    
        <button type="submit">Send Message</button>
    </form>
    <script>
        document.getElementById('messageForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent the form from submitting immediately
            const content = document.getElementById('editor').innerHTML;
            document.getElementById('hiddenInput').value = content;  // Ensure the content is passed in the hidden input
            this.submit(); // Now the form is ready to be submitted
        });
    </script>
</body>
</html>
